# Netlify — https://docs.netlify.com/integrations/frameworks/next-js/
# Next.js is auto-detected; this file pins the build and Node version.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Next.js inlines NEXT_PUBLIC_* into JS; Netlify secrets scan would otherwise fail when values match env vars.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CALENDLY_URL,NEXT_PUBLIC_RECAPTCHA_SITE_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

# Set secrets in Netlify → Site configuration → Environment variables (never commit them).
# Use scope "All" (Production + Deploy previews + Branch deploys) unless you intentionally differ.
#
# Lead form + /api/lead (required for submissions to succeed):
#   SUPABASE_SERVICE_ROLE_KEY — service role key (server only; never NEXT_PUBLIC)
#   SUPABASE_URL — project URL (server only; recommended on Netlify so the API reads it at runtime)
#   OR NEXT_PUBLIC_SUPABASE_URL — same URL; must be present at `npm run build` if you rely on this name only
#
# reCAPTCHA v2 "I'm not a robot" checkbox — https://www.google.com/recaptcha/admin
#   NEXT_PUBLIC_RECAPTCHA_SITE_KEY — must be set before build (rebuild after adding)
#   RECAPTCHA_SECRET_KEY — server only; if set, submissions must pass verification
#   Add your Netlify URL (e.g. https://yoursite.netlify.app) and production domain under reCAPTCHA allowed domains.
#
# Optional: NEXT_PUBLIC_SUPABASE_ANON_KEY (if you add client-side Supabase later), NEXT_PUBLIC_CALENDLY_URL (required for Calendly buttons—no default in repo)
